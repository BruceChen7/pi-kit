<div class="theme-toggle" role="group" aria-label="Theme">
  <button data-theme-set="light" aria-label="Light" title="Light">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
  </button>
  <button data-theme-set="system" aria-label="System" title="System">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
  </button>
  <button data-theme-set="dark" aria-label="Dark" title="Dark">
    <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</div>
<script>
(function () {
  var h = document.documentElement;
  var get = function () { return localStorage.getItem('theme') || 'system'; };
  var apply = function (t) {
    if (t === 'system') delete h.dataset.theme;
    else h.dataset.theme = t;
    document.querySelectorAll('.theme-toggle button').forEach(function (b) {
      b.setAttribute('aria-pressed', b.dataset.themeSet === t ? 'true' : 'false');
    });
  };
  apply(get());
  document.querySelectorAll('.theme-toggle button').forEach(function (b) {
    b.addEventListener('click', function () {
      var t = b.dataset.themeSet;
      localStorage.setItem('theme', t);
      var hadMermaid = !!document.querySelector('svg[id^="mermaid"], pre.mermaid');
      apply(t);
      if (hadMermaid) location.reload();
    });
  });
})();
</script>
